<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NETLAND.id Billing Pro</title>

<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="sidebar">

<div class="logo">
NETLAND.id
</div>

<ul>
<li>Dashboard</li>
<li>Pelanggan</li>
<li>Billing</li>
<li>Laporan</li>
<li>Pengaturan</li>
</ul>

</div>

<div class="content">

<div class="cards">

<div class="card">
<h3>Total Pelanggan</h3>
<span id="totalCustomer">0</span>
</div>

<div class="card">
<h3>Aktif</h3>
<span id="aktifCustomer">0</span>
</div>

<div class="card">
<h3>Menunggak</h3>
<span id="menunggakCustomer">0</span>
</div>

<div class="card">
<h3>Suspend</h3>
<span id="suspendCustomer">0</span>
</div>

</div>

<div class="panel">

<h2>Tambah Pelanggan</h2>

<input id="nama" placeholder="Nama">

<input id="wa" placeholder="WhatsApp">

<select id="paket">

<option value="135000">
Basic - Up To 30 Mbps - Rp135.000
</option>

<option value="165000">
Family - Up To 50 Mbps - Rp165.000
</option>

</select>

<input id="dueDate" type="number" min="1" max="31">

<button onclick="addCustomer()">
Simpan
</button>

</div>

<div class="panel">

<input
id="search"
placeholder="Cari pelanggan..."
onkeyup="renderCustomer()"
>

<table>

<thead>
<tr>
<th>ID</th>
<th>Nama</th>
<th>WA</th>
<th>Paket</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="customerTable">
</tbody>

</table>

</div>

</div>

<script src="assets/js/storage.js"></script>
<script src="assets/js/customer.js"></script>
<script src="assets/js/dashboard.js"></script>
<script src="assets/js/whatsapp.js"></script>
<script src="assets/js/app.js"></script>

</body>
  </html>
